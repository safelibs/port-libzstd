name: libzstd-safe-linear-workflow
backend: codex
max_bounces: 999

phases:
  - id: impl_safe_decompression_independence
    prompt: |-
      Implement Phase 1 from `.plan/phases/01-safe-decompression-independence.md`.
      Use `.plan/workflow-structure.yaml` as the authoritative source for phase order, phase IDs, phase types, and fixed `bounce_target` values.
      Consume and update the listed artifacts in place, keep the workflow linear and inline-only, and commit all work to git before yielding.
  - id: script_safe_decompression_independence
    type: script
    bounce_target: impl_safe_decompression_independence
    run: |-
      cargo test --manifest-path safe/Cargo.toml --release --test decompress
      bash safe/scripts/run-capi-decompression.sh
      bash safe/scripts/verify-export-parity.sh
      bash safe/scripts/verify-baseline-contract.sh
      rg -n 'SAFE_UPSTREAM_LIB|load_upstream!|dlopen|dlsym' safe/src/decompress safe/src/ffi/decompress.rs safe/scripts/run-capi-decompression.sh
  - id: check_safe_decompression_software_tester
    type: check
    bounce_target: impl_safe_decompression_independence
    prompt: |-
      Reviewer role: Software Tester.
      Review the current workspace against `.plan/phases/01-safe-decompression-independence.md` for `impl_safe_decompression_independence`.
      Use `.plan/workflow-structure.yaml` as authoritative, do not modify files, and verify that artifacts were updated in place.
  - id: check_safe_decompression_senior_tester
    type: check
    bounce_target: impl_safe_decompression_independence
    prompt: |-
      Reviewer role: Senior Tester.
      Review the current workspace against `.plan/phases/01-safe-decompression-independence.md` for `impl_safe_decompression_independence`.
      Use `.plan/workflow-structure.yaml` as authoritative, do not modify files, and verify ABI preservation, unsafe reduction, and removal of decompression-side dynamic loading.

